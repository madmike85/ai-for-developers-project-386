# render.yaml - Render.com Blueprint for Call Calendar
# This file defines the infrastructure for deploying the full-stack application

services:
  # PostgreSQL Database (Free tier)
  # Automatically provisioned and managed by Render
  - type: postgres
    name: call-calendar-db
    plan: free
    ipAllowList: []  # Allow all (adjust for production security)

  # Backend API (NestJS + Prisma)
  # Handles API requests and database operations
  - type: web
    name: call-calendar-api
    runtime: node
    plan: free
    branch: main
    # Build commands - install deps, generate Prisma client, compile TypeScript
    buildCommand: |
      npm install
      npm install -g prisma@5.22.0 typescript
      npx prisma generate --schema=packages/db/prisma/schema.prisma
      cd apps/api && npm run build
    # Start command - run migrations then start server
    startCommand: |
      npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma
      node apps/api/dist/main
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: call-calendar-db
          property: connectionString
      # CORS - wildcard for simple setup (can restrict to specific URL later)
      - key: FRONTEND_URL
        value: "*"
    # Health check path for monitoring (uses /health endpoint)
    healthCheckPath: /health

  # Frontend (Static Site)
  # React + Vite SPA served as static files
  - type: static
    name: call-calendar-web
    plan: free
    branch: main
    # Build command - install deps and build Vite app
    buildCommand: |
      npm install
      npm install -g typescript
      cd apps/web && npm run build
    # Directory containing built static files
    staticPublishPath: apps/web/dist
    # Environment variables for build-time
    envVars:
      - key: VITE_API_URL
        value: https://call-calendar-api.onrender.com
      - key: VITE_USE_MOCK_API
        value: "false"
    # Routes for SPA - all routes serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
